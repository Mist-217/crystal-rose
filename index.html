<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Rose - Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: var(--anthropic-light);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 28px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.5);
        }

        .sidebar .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section {
            margin-bottom: 28px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '✦';
            color: #ffb6c1;
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            color: #fff;
        }

        .seed-input:focus {
            outline: none;
            border-color: #ffb6c1;
            box-shadow: 0 0 0 2px rgba(255, 182, 193, 0.2);
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #ffb6c1;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(255, 182, 193, 0.5);
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #ffb6c1;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            min-width: 50px;
            text-align: right;
        }

        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .button {
            background: linear-gradient(135deg, #ffb6c1 0%, #ff69b4 100%);
            color: #1a1a2e;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.3);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .button.secondary:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .button.tertiary {
            background: rgba(106, 155, 204, 0.3);
            color: #fff;
        }

        .button.tertiary:hover {
            background: rgba(106, 155, 204, 0.5);
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 900px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            background: radial-gradient(ellipse at center, #1a0a1a 0%, #0d0d1a 100%);
            border: 1px solid rgba(255, 182, 193, 0.1);
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            padding: 200px;
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
                padding: 10px;
            }

            .sidebar {
                width: 100%;
                order: 2;
                max-height: 50vh;
                padding: 16px;
            }

            .sidebar h1 {
                font-size: 22px;
            }

            .canvas-area {
                order: 1;
                padding: 10px;
            }

            #canvas-container {
                max-width: 100%;
            }

            .control-section {
                margin-bottom: 20px;
            }

            .control-group {
                margin-bottom: 14px;
            }
        }

        @media (max-width: 600px) {
            .sidebar {
                padding: 12px;
            }

            .seed-controls {
                grid-template-columns: 1fr 1fr;
            }

            .button {
                padding: 8px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>🌹 Crystal Rose</h1>
            <div class="subtitle">Ethereal glass petals dancing in light. A generative interpretation of eternal romance.</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="777" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Petal Layers</label>
                    <div class="slider-container">
                        <input type="range" id="petalLayers" min="3" max="12" step="1" value="7" oninput="updateParam('petalLayers', this.value)">
                        <span class="value-display" id="petalLayers-value">7</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Glass Opacity</label>
                    <div class="slider-container">
                        <input type="range" id="glassOpacity" min="0.1" max="0.8" step="0.05" value="0.35" oninput="updateParam('glassOpacity', this.value)">
                        <span class="value-display" id="glassOpacity-value">0.35</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Pink Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="pinkIntensity" min="0.2" max="1.0" step="0.05" value="0.7" oninput="updateParam('pinkIntensity', this.value)">
                        <span class="value-display" id="pinkIntensity-value">0.7</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Bloom Spread</label>
                    <div class="slider-container">
                        <input type="range" id="bloomSpread" min="0.5" max="2.0" step="0.1" value="1.2" oninput="updateParam('bloomSpread', this.value)">
                        <span class="value-display" id="bloomSpread-value">1.2</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Animation Speed</label>
                    <div class="slider-container">
                        <input type="range" id="animSpeed" min="0" max="2" step="0.1" value="0.8" oninput="updateParam('animSpeed', this.value)">
                        <span class="value-display" id="animSpeed-value">0.8</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Water Ripple</label>
                    <div class="slider-container">
                        <input type="range" id="waterRipple" min="0" max="1" step="0.1" value="0.6" oninput="updateParam('waterRipple', this.value)">
                        <span class="value-display" id="waterRipple-value">0.6</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Falling Petals</label>
                    <div class="slider-container">
                        <input type="range" id="fallingPetals" min="0" max="30" step="1" value="12" oninput="updateParam('fallingPetals', this.value)">
                        <span class="value-display" id="fallingPetals-value">12</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Dew Drops</label>
                    <div class="slider-container">
                        <input type="range" id="dewDrops" min="0" max="20" step="1" value="8" oninput="updateParam('dewDrops', this.value)">
                        <span class="value-display" id="dewDrops-value">8</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>

                <div class="color-group">
                    <label>Rose Pink</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#ffb6c1" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#ffb6c1</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Deep Pink</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#ff69b4" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#ff69b4</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Glass Highlight</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#e6f3ff" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#e6f3ff</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                    <button class="button secondary" onclick="saveImage()">Save</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Growing crystal rose...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 777,
            petalLayers: 7,
            glassOpacity: 0.35,
            pinkIntensity: 0.7,
            bloomSpread: 1.2,
            animSpeed: 0.8,
            waterRipple: 0.6,
            fallingPetals: 12,
            dewDrops: 8,
            colorPalette: ['#ffb6c1', '#ff69b4', '#e6f3ff']
        };

        let defaultParams = {...params};
        let time = 0;
        let ambientParticles = [];
        let fallingPetalParticles = [];
        let ripples = [];
        let dewDropPositions = [];

        function setup() {
            let canvasSize = windowWidth < 900 ? min(windowWidth - 40, 600) : 800;
            let canvas = createCanvas(canvasSize, canvasSize);
            canvas.parent('canvas-container');
            colorMode(RGB, 255, 255, 255, 1);
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function windowResized() {
            let canvasSize = windowWidth < 900 ? min(windowWidth - 40, 600) : 800;
            resizeCanvas(canvasSize, canvasSize);
            initializeSystem();
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            time = 0;
            ambientParticles = [];
            fallingPetalParticles = [];
            ripples = [];
            dewDropPositions = [];

            // Ambient floating particles
            for (let i = 0; i < 100; i++) {
                ambientParticles.push({
                    x: random(800),
                    y: random(800),
                    size: random(1, 3),
                    speed: random(0.2, 0.8),
                    alpha: random(0.1, 0.4)
                });
            }

            // Initialize falling petals
            initFallingPetals();

            // Initialize water ripples
            for (let i = 0; i < 5; i++) {
                ripples.push({
                    x: random(200, 600),
                    y: random(200, 600),
                    radius: random(50, 150),
                    phase: random(TWO_PI),
                    speed: random(0.5, 1.5)
                });
            }

            // Initialize dew drop positions on petals
            initDewDrops();
        }

        function initFallingPetals() {
            fallingPetalParticles = [];
            let count = params.fallingPetals;
            for (let i = 0; i < count; i++) {
                fallingPetalParticles.push({
                    x: random(-400, 400),
                    y: random(-400, 400),
                    z: random(0.5, 1.5),
                    size: random(8, 18),
                    rotation: random(TWO_PI),
                    rotSpeed: random(-0.02, 0.02),
                    fallSpeed: random(0.3, 0.8),
                    sway: random(0, TWO_PI),
                    swaySpeed: random(0.01, 0.03),
                    opacity: random(0.4, 0.8)
                });
            }
        }

        function initDewDrops() {
            dewDropPositions = [];
            let dropsPerLayer = floor(params.dewDrops / params.petalLayers);
            let scaleFactor = width / 800;

            for (let layer = 0; layer < params.petalLayers; layer++) {
                let progress = layer / params.petalLayers;
                let petalCount = floor(5 + layer * 2.5);
                let baseRadius = (60 + layer * 35) * params.bloomSpread * scaleFactor;

                for (let d = 0; d < dropsPerLayer; d++) {
                    let petalIndex = floor(random(petalCount));
                    let angleOffset = (TWO_PI / petalCount) * petalIndex;
                    let t = random(0.3, 0.9);
                    let distFromCenter = t * baseRadius * 0.8;

                    dewDropPositions.push({
                        layer: layer,
                        petalIndex: petalIndex,
                        angleOffset: angleOffset,
                        t: t,
                        dist: distFromCenter,
                        size: random(3, 7) * scaleFactor,
                        phase: random(TWO_PI)
                    });
                }
            }
        }

        function draw() {
            // Deep romantic background with subtle gradient
            background(15, 10, 25);

            time += params.animSpeed * 0.01;

            push();
            translate(width / 2, height / 2);

            // Draw water ripple effect
            if (params.waterRipple > 0) {
                drawWaterRipples();
            }

            // Draw ambient particles
            drawAmbientParticles();

            // Draw the crystal rose with dew drops
            drawCrystalRose();

            // Draw falling petals
            if (params.fallingPetals > 0) {
                drawFallingPetals();
            }

            pop();
        }

        function drawWaterRipples() {
            push();
            blendMode(ADD);
            noFill();

            let scaleFactor = width / 800;
            let intensity = params.waterRipple;

            for (let ripple of ripples) {
                let pulse = sin(time * ripple.speed + ripple.phase) * 0.5 + 0.5;
                let alpha = intensity * 0.08 * pulse;

                stroke(100, 150, 200, alpha);
                strokeWeight(1.5 * scaleFactor);

                // Draw multiple concentric rings
                for (let r = 0; r < 4; r++) {
                    let radius = ripple.radius + r * 30 * scaleFactor + sin(time * 2 + r) * 10 * scaleFactor;
                    let ringAlpha = alpha * (1 - r * 0.2);

                    stroke(150, 200, 255, ringAlpha);

                    beginShape();
                    for (let a = 0; a <= TWO_PI; a += 0.1) {
                        let wobble = sin(a * 8 + time * 3) * 5 * scaleFactor * pulse;
                        let x = ripple.x - 400 * scaleFactor + cos(a) * (radius + wobble);
                        let y = ripple.y - 400 * scaleFactor + sin(a) * (radius + wobble * 0.5);
                        vertex(x, y);
                    }
                    endShape(CLOSE);
                }
            }

            pop();
        }

        function drawAmbientParticles() {
            noStroke();
            let scaleFactor = width / 800;

            for (let p of ambientParticles) {
                let pulse = sin(time * 2 + p.x * 0.01) * 0.5 + 0.5;
                fill(255, 182, 193, p.alpha * pulse * 0.3);

                let sx = map(p.x, 0, 800, -width/2, width/2);
                let sy = map(p.y, 0, 800, -height/2, height/2);
                let ssize = map(p.size, 1, 3, 1, 3) * scaleFactor;

                circle(
                    sx + sin(time + p.y * 0.01) * 20 * scaleFactor,
                    sy + cos(time * 0.7 + p.x * 0.01) * 20 * scaleFactor,
                    ssize * (0.5 + pulse * 0.5)
                );
            }
        }

        function drawFallingPetals() {
            push();
            let scaleFactor = width / 800;
            let c1 = hexToRgb(params.colorPalette[0]);
            let c2 = hexToRgb(params.colorPalette[1]);

            for (let petal of fallingPetalParticles) {
                // Update position
                petal.y += petal.fallSpeed * scaleFactor * (params.animSpeed + 0.2);
                petal.sway += petal.swaySpeed;
                petal.rotation += petal.rotSpeed;

                let swayOffset = sin(petal.sway) * 30 * scaleFactor;

                // Reset if out of bounds
                if (petal.y > height/2 + 100 * scaleFactor) {
                    petal.y = -height/2 - 50 * scaleFactor;
                    petal.x = random(-width/2, width/2);
                }

                // Draw petal
                push();
                translate(petal.x + swayOffset, petal.y);
                rotate(petal.rotation);
                scale(petal.z);

                let pinkMix = sin(time + petal.x * 0.01) * 0.5 + 0.5;
                let r = lerp(c1.r, c2.r, pinkMix);
                let g = lerp(c1.g, c2.g, pinkMix);
                let b = lerp(c1.b, c2.b, pinkMix);

                noStroke();
                fill(r, g, b, petal.opacity * 0.6);

                // Draw petal shape
                beginShape();
                vertex(0, -petal.size * scaleFactor);
                bezierVertex(
                    petal.size * scaleFactor, -petal.size * 0.3 * scaleFactor,
                    petal.size * scaleFactor, petal.size * 0.3 * scaleFactor,
                    0, petal.size * scaleFactor
                );
                bezierVertex(
                    -petal.size * scaleFactor, petal.size * 0.3 * scaleFactor,
                    -petal.size * scaleFactor, -petal.size * 0.3 * scaleFactor,
                    0, -petal.size * scaleFactor
                );
                endShape(CLOSE);

                // Petal highlight
                fill(255, 255, 255, 0.3);
                circle(-petal.size * 0.3 * scaleFactor, -petal.size * 0.3 * scaleFactor, petal.size * 0.4 * scaleFactor);

                pop();
            }
            pop();
        }

        function drawCrystalRose() {
            let layers = params.petalLayers;
            let scaleFactor = width / 800;

            // Draw from outer to inner for proper layering
            for (let layer = layers; layer >= 0; layer--) {
                drawPetalLayer(layer, layers, scaleFactor);
            }

            // Draw dew drops
            if (params.dewDrops > 0) {
                drawDewDrops(scaleFactor);
            }

            // Draw center glow
            drawCenterGlow(scaleFactor);
        }

        function drawPetalLayer(layer, totalLayers, scaleFactor) {
            let progress = layer / totalLayers;
            let petalCount = floor(5 + layer * 2.5);
            let baseRadius = (60 + layer * 35) * params.bloomSpread * scaleFactor;
            let layerPhase = time * (1 + layer * 0.1) + layer * 0.5;

            let c1 = hexToRgb(params.colorPalette[0]);
            let c2 = hexToRgb(params.colorPalette[1]);
            let c3 = hexToRgb(params.colorPalette[2]);

            for (let i = 0; i < petalCount; i++) {
                let angleOffset = (TWO_PI / petalCount) * i;
                let layerRotation = layer * 0.3 + time * 0.1;
                let angle = angleOffset + layerRotation;

                let breath = sin(layerPhase + i * 0.5) * 0.08 + 1;
                let radius = baseRadius * breath;

                push();
                rotate(angle);

                drawGlassPetal(
                    radius,
                    layer,
                    totalLayers,
                    i,
                    petalCount,
                    c1, c2, c3,
                    scaleFactor
                );

                pop();
            }
        }

        function drawGlassPetal(radius, layer, totalLayers, index, petalCount, c1, c2, c3, scaleFactor) {
            let progress = layer / totalLayers;

            let petalWidth = (30 + layer * 8) * (0.8 + sin(time * 0.5 + index) * 0.2) * scaleFactor;
            let petalLength = radius * (0.9 + sin(time * 0.3 + layer) * 0.1);

            beginShape();

            let pinkFactor = params.pinkIntensity * (1 - progress * 0.3);
            let r = lerp(c1.r, c2.r, progress) * pinkFactor + 255 * (1 - pinkFactor) * 0.9;
            let g = lerp(c1.g, c2.g, progress) * pinkFactor + 255 * (1 - pinkFactor) * 0.95;
            let b = lerp(c1.b, c2.b, progress) * pinkFactor + 255 * (1 - pinkFactor);

            let alpha = params.glassOpacity * (0.6 + progress * 0.4);

            noStroke();

            let segments = 20;
            for (let s = 0; s <= segments; s++) {
                let t = s / segments;
                let w = petalWidth * sin(t * PI) * (1 - t * 0.3);
                let x = t * petalLength;
                let y = 0;

                let curve = sin(t * PI) * (10 + layer * 3) * sin(time * 0.5 + layer + index * 0.2) * scaleFactor;
                let edgeGlow = map(abs(t - 0.5), 0, 0.5, 1, 0.3);

                fill(r, g, b, alpha * edgeGlow * 0.5);

                vertex(x, y - w + curve);
            }

            for (let s = segments; s >= 0; s--) {
                let t = s / segments;
                let w = petalWidth * sin(t * PI) * (1 - t * 0.3);
                let x = t * petalLength;
                let y = 0;
                let curve = sin(t * PI) * (10 + layer * 3) * sin(time * 0.5 + layer + index * 0.2) * scaleFactor;

                vertex(x, y + w + curve);
            }

            endShape(CLOSE);

            // Glass reflection lines
            stroke(c3.r, c3.g, c3.b, alpha * 0.6);
            strokeWeight(1);
            noFill();

            // Central vein
            beginShape();
            for (let t = 0.1; t < 0.9; t += 0.1) {
                let x = t * petalLength;
                let curve = sin(t * PI) * (5 + layer * 2) * sin(time * 0.5 + layer) * scaleFactor;
                vertex(x, curve);
            }
            endShape();

            // Side veins
            for (let v = 1; v <= 2; v++) {
                beginShape();
                for (let t = 0.2; t < 0.8; t += 0.1) {
                    let side = v === 1 ? -1 : 1;
                    let x = t * petalLength;
                    let w = petalWidth * sin(t * PI) * 0.4;
                    let curve = sin(t * PI) * (5 + layer * 2) * sin(time * 0.5 + layer) * scaleFactor;
                    vertex(x, curve + side * w);
                }
                endShape();
            }

            // Glass edge highlight
            stroke(255, 255, 255, alpha * 0.8);
            strokeWeight(2 * scaleFactor);
            beginShape();
            noFill();
            for (let s = 0; s <= segments; s++) {
                let t = s / segments;
                let w = petalWidth * sin(t * PI) * (1 - t * 0.3);
                let x = t * petalLength;
                let curve = sin(t * PI) * (10 + layer * 3) * sin(time * 0.5 + layer + index * 0.2) * scaleFactor;
                vertex(x, -w + curve);
            }
            endShape();

            // Inner glow
            noStroke();
            fill(r, g, b, alpha * 0.3);
            let glowSize = petalLength * 0.6;
            circle(petalLength * 0.5, 0, glowSize);
        }

        function drawDewDrops(scaleFactor) {
            push();

            let c1 = hexToRgb(params.colorPalette[0]);
            let c3 = hexToRgb(params.colorPalette[2]);

            for (let drop of dewDropPositions) {
                // Check if this drop should be visible based on current dew drop count
                if (drop.layer * 10 + drop.petalIndex >= params.dewDrops * 2) continue;

                let layerPhase = time * (1 + drop.layer * 0.1) + drop.layer * 0.5;
                let breath = sin(layerPhase + drop.petalIndex * 0.5) * 0.08 + 1;
                let angleOffset = drop.angleOffset + drop.layer * 0.3 + time * 0.1;

                push();
                rotate(angleOffset);

                // Calculate drop position on petal
                let dist = drop.dist * breath;
                let t = drop.t;
                let petalCurve = sin(t * PI) * (10 + drop.layer * 3) * sin(time * 0.5 + drop.layer + drop.petalIndex * 0.2) * scaleFactor;

                let dx = t * dist;
                let dy = petalCurve * 0.5;

                // Add subtle wobble
                let wobble = sin(time * 2 + drop.phase) * 0.5 * scaleFactor;

                // Draw dew drop shadow
                noStroke();
                fill(0, 0, 0, 0.2);
                circle(dx + 1 * scaleFactor, dy + 1 * scaleFactor, drop.size * 1.2);

                // Draw dew drop body
                fill(220, 240, 255, 0.7);
                circle(dx + wobble, dy, drop.size);

                // Draw dew drop highlight (reflection)
                fill(255, 255, 255, 0.9);
                circle(dx - drop.size * 0.25 + wobble, dy - drop.size * 0.25, drop.size * 0.35);

                // Secondary highlight
                fill(200, 230, 255, 0.5);
                circle(dx + drop.size * 0.2 + wobble, dy + drop.size * 0.2, drop.size * 0.2);

                pop();
            }

            pop();
        }

        function drawCenterGlow(scaleFactor) {
            let c2 = hexToRgb(params.colorPalette[1]);

            for (let i = 5; i >= 0; i--) {
                let size = (20 + i * 25) * scaleFactor;
                let alpha = 0.15 - i * 0.02;
                let pulse = sin(time * 2) * 0.1 + 1;

                noStroke();
                fill(c2.r, c2.g, c2.b, alpha);
                circle(0, 0, size * pulse);
            }

            fill(255, 220, 230, 0.9);
            circle(0, 0, (12 + sin(time * 3) * 2) * scaleFactor);

            fill(255, 255, 255, 0.95);
            for (let i = 0; i < 6; i++) {
                let angle = time * 0.5 + (TWO_PI / 6) * i;
                let r = (8 + sin(time * 2 + i) * 2) * scaleFactor;
                let x = cos(angle) * r;
                let y = sin(angle) * r;
                circle(x, y, 2 * scaleFactor);
            }
        }

        function hexToRgb(hex) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return {r, g, b};
        }

        function updateParam(paramName, value) {
            params[paramName] = parseFloat(value);
            document.getElementById(paramName + '-value').textContent = value;

            // Reinitialize certain effects when counts change
            if (paramName === 'fallingPetals') {
                initFallingPetals();
            } else if (paramName === 'dewDrops') {
                initDewDrops();
            }
        }

        function updateColor(colorId, value) {
            let index = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[index] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = {...defaultParams};

            document.getElementById('petalLayers').value = params.petalLayers;
            document.getElementById('petalLayers-value').textContent = params.petalLayers;
            document.getElementById('glassOpacity').value = params.glassOpacity;
            document.getElementById('glassOpacity-value').textContent = params.glassOpacity;
            document.getElementById('pinkIntensity').value = params.pinkIntensity;
            document.getElementById('pinkIntensity-value').textContent = params.pinkIntensity;
            document.getElementById('bloomSpread').value = params.bloomSpread;
            document.getElementById('bloomSpread-value').textContent = params.bloomSpread;
            document.getElementById('animSpeed').value = params.animSpeed;
            document.getElementById('animSpeed-value').textContent = params.animSpeed;
            document.getElementById('waterRipple').value = params.waterRipple;
            document.getElementById('waterRipple-value').textContent = params.waterRipple;
            document.getElementById('fallingPetals').value = params.fallingPetals;
            document.getElementById('fallingPetals-value').textContent = params.fallingPetals;
            document.getElementById('dewDrops').value = params.dewDrops;
            document.getElementById('dewDrops-value').textContent = params.dewDrops;

            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];

            updateSeedDisplay();
            initializeSystem();
        }

        function saveImage() {
            saveCanvas('crystal-rose-' + params.seed, 'png');
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
